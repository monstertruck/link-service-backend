# Domains listed here will be rejected when POSTing a new link.
# Use the bare hostname (with or without www).
# Examples:
#   - twitter.com
#   - www.facebook.com
skip_domains:
  - bsky.com
  - twitter.com
  - x.com
  - lobste.rs
  - ft.com
  - bloomberg.com
  - nytimes.com
  - wsj.com
  - axios.com
  - wapo.st
# Podcast domains — links from these hosts will be rejected entirely.
# Use the bare hostname (with or without www).
# Examples:
#   - podcasts.apple.com
#   - open.spotify.com
podcast_domains:
  - podcasts.apple.com
  - open.spotify.com
  - overcast.fm
  - pocketcasts.com
  - castro.fm
  - podcastaddict.com